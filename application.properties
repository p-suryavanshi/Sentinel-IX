# ═══════════════════════════════════════════════════════════════════════
#  SENTINEL-IX · Spring Boot Application Configuration
# ═══════════════════════════════════════════════════════════════════════

server.port=8080

# ── H2 In-Memory Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:sentinel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console (access at http://localhost:8080/h2-console) ────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson (ISO-8601 timestamps in JSON) ───────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── CORS (allow frontend on any port during development) ────────────────
# Handled via @CrossOrigin on controller

# ── Logging ─────────────────────────────────────────────────────────────
logging.level.com.sentinel=INFO
logging.level.org.springframework.web=WARN
